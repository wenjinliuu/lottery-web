<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4f5f9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b0f1c" media="(prefers-color-scheme: dark)">
    <title>彩票号码备忘</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23ef4444'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-size='28' fill='white' font-family='Arial,sans-serif'%3E%E5%BD%A9%3C/text%3E%3C/svg%3E">
    <script>
      /* 主题预加载：避免暗色模式刷新闪烁 */
      (function () {
        try {
          var saved = localStorage.getItem("lottery-theme");
          if (saved === "light" || saved === "dark") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero-main">
          <div class="date" id="todayTitle">今日号码</div>
          <div class="sub" id="weekTitle">本地网页 / IndexedDB</div>
          <div class="recommend" id="heroTitle">双色球 选号</div>
        </div>
      </header>

      <section class="view-section" data-view-panel="random">
        <div class="custom-random-panel">
          <section class="card">
            <div class="section-title">彩种</div>
            <div class="tab-grid" id="gameTabs"></div>
            <select id="gameSelect" class="sr-only" aria-label="彩种"></select>
          </section>

          <section class="card" id="playModeField">
            <div class="section-title">玩法</div>
            <div class="segment-row play-row" id="playModeTabs"></div>
            <select id="playModeSelect" class="sr-only" aria-label="玩法"></select>
          </section>

          <section class="card compact-card" id="countCard">
            <div class="section-title">注数</div>
            <div class="segment-row count-row" id="countTabs"></div>
            <input id="countInput" class="sr-only" type="number" min="1" max="10" value="1">
            <input id="priceInput" class="sr-only" type="number" min="0" step="0.5" value="2">
            <input id="multipleInput" class="sr-only" type="number" min="1" max="99" value="1">
          </section>

          <section class="card action-card">
            <div class="toolbar toolbar-primary">
              <button class="tool-btn tool-btn-light" id="randomBtn" type="button">重新随机</button>
              <div class="multiplier-control" aria-label="倍数">
                <button class="multiplier-btn" id="decreaseMultiplierBtn" type="button">-</button>
                <span class="multiplier-value" id="multiplierText">1倍</span>
                <button class="multiplier-btn" id="increaseMultiplierBtn" type="button">+</button>
              </div>
            </div>
            <div class="toolbar toolbar-secondary">
              <button class="tool-btn tool-btn-primary" id="saveBtn" type="button">保存记录复制</button>
            </div>
          </section>

          <section class="card">
            <div class="title-row">
              <div class="title-main">
                <div class="section-title section-title-no-margin">选号列表</div>
              </div>
              <button class="mini-clear" id="clearDraftBtn" type="button">清空</button>
            </div>
            <div class="meta meta-row ticket-meta-row">
              <div id="draftSummary">暂无号码</div>
            </div>
            <div id="draftList" class="ticket-list empty">点击“重新随机”生成号码</div>
          </section>
        </div>
      </section>

      <section class="view-section" data-view-panel="check" hidden>
        <div class="check-page">
          <div class="check-page-head">
            <div>
              <div class="section-title check-page-title">最新开奖号码</div>
              <div class="draw-update-time" id="latestDrawsUpdated">暂无更新时间</div>
            </div>
            <div class="check-title-actions">
              <button class="check-expand-btn" id="toggleDrawsBtn" type="button">展开</button>
              <button class="check-expand-btn" id="reloadDrawsBtn" type="button">刷新开奖号码</button>
            </div>
          </div>
          <div id="latestDraws" class="check-card-list"></div>

          <div class="check-records-head">
            <div class="section-title check-page-title check-records-title-fixed">选号记录</div>
            <button class="check-records-refresh" id="checkRecordsBtn" type="button">重新核对</button>
          </div>
          <section class="card check-records-card">
            <div id="recordList" class="record-list empty">暂无保存记录</div>
          </section>
        </div>
      </section>

      <section class="view-section" data-view-panel="history" hidden>
        <div class="history-page">
          <div class="history-head">
            <div class="history-title-wrap">
              <div class="history-title">往期开奖</div>
              <div class="history-sub" id="historySummary">读取本地开奖 JSON</div>
            </div>
            <button class="mini-blue" id="historyBackBtn" type="button">返回</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </section>

      <section class="view-section" data-view-panel="mine" hidden>
        <div class="mine-page">
          <section class="card mine-hero-card">
            <div class="mine-hero-top">
              <div class="mine-avatar">我</div>
              <div class="mine-user-copy">
                <div class="mine-user-name">本地账户</div>
                <div class="mine-user-sub">数据保存在当前浏览器，记得定期导出备份。</div>
              </div>
            </div>
            <div class="mine-stat-row">
              <div class="mine-stat">
                <div class="mine-stat-value" id="mineTotalCost">0元</div>
                <div class="mine-stat-label">总花费</div>
              </div>
              <div class="mine-stat">
                <div class="mine-stat-value" id="minePrizeTotal">0元</div>
                <div class="mine-stat-label">中奖金额</div>
              </div>
              <div class="mine-stat">
                <div class="mine-stat-value" id="mineWinRate">0%</div>
                <div class="mine-stat-label">中奖率</div>
              </div>
              <div class="mine-stat">
                <div class="mine-stat-value" id="mineWonCount">0</div>
                <div class="mine-stat-label">中奖记录</div>
              </div>
            </div>
          </section>

          <section class="card profit-card" id="profitCard">
            <div class="profit-head">
              <div class="profit-head-left">
                <div class="profit-title">收益趋势</div>
                <div class="profit-sub" id="profitSub">最近 30 天</div>
              </div>
              <div class="profit-net">
                <div class="profit-net-value" id="profitNetValue">0元</div>
                <div class="profit-net-delta" id="profitNetDelta">总盈亏</div>
              </div>
            </div>
            <div class="profit-chart-wrap" id="profitChartWrap">
              <div class="profit-empty" id="profitEmpty">暂无数据，先去选号吧</div>
            </div>
            <div class="profit-legend">
              <span class="profit-legend-item"><span class="profit-legend-dot is-cost"></span>累计花费</span>
              <span class="profit-legend-item"><span class="profit-legend-dot is-prize"></span>累计中奖</span>
              <span class="profit-legend-item"><span class="profit-legend-dot is-net"></span>净收益</span>
            </div>
          </section>

          <section class="card mine-section-card">
            <div class="section-title section-title-no-margin">外观</div>
            <div class="mine-menu-item mine-menu-item-last">
              <div class="mine-menu-copy">
                <div class="mine-menu-title">深色模式</div>
                <div class="mine-menu-sub" id="themeToggleSub">跟随系统</div>
              </div>
              <button class="theme-toggle" id="themeToggleBtn" type="button" role="switch" aria-checked="false" aria-label="切换深色模式"></button>
            </div>
          </section>

          <section class="card mine-section-card">
            <div class="section-title section-title-no-margin">记录与备份</div>
            <div class="mine-menu-item">
              <div class="mine-menu-copy">
                <div class="mine-menu-title">选号记录</div>
                <div class="mine-menu-sub" id="mineRecordSummary">共 0 条记录</div>
              </div>
              <button class="mini-blue" id="mineRecordToggleBtn" type="button">查看</button>
            </div>
            <div class="mine-menu-item">
              <div class="mine-menu-copy">
                <div class="mine-menu-title">导出备份</div>
                <div class="mine-menu-sub">生成 JSON 文件，换设备时可以恢复。</div>
              </div>
              <button class="mini-green" id="exportBackupBtn" type="button">导出</button>
            </div>
            <label class="mine-menu-item mine-menu-item-last">
              <div class="mine-menu-copy">
                <div class="mine-menu-title">导入备份</div>
                <div class="mine-menu-sub">选择之前导出的备份文件。</div>
              </div>
              <span class="mini-blue">导入</span>
              <input id="importBackupInput" class="sr-only" type="file" accept="application/json">
            </label>
          </section>

          <section class="card mine-section-card" id="mineRecordPanel" hidden>
            <div class="title-row">
              <div class="section-title section-title-no-margin">完整选号记录</div>
              <button class="mini-blue" id="mineRecordCloseBtn" type="button">收起</button>
            </div>
            <div id="mineRecordList" class="record-list empty">暂无保存记录</div>
          </section>
        </div>
      </section>

      <nav class="dock-wrap" aria-label="底部导航">
        <div class="dock">
          <button class="dock-item dock-item-active" type="button" data-view="random" aria-label="选号">
            <span class="dock-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="17" height="17" rx="4"/><circle cx="8.5" cy="8.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="12"   cy="12"  r="1.2" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.2" fill="currentColor" stroke="none"/></svg>
            </span>
            <span class="dock-label">选号</span>
          </button>
          <button class="dock-item" type="button" data-view="check" aria-label="兑奖">
            <span class="dock-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M3 8.5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v1.2a1.8 1.8 0 0 0 0 3.6V14.5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1.2a1.8 1.8 0 0 0 0-3.6Z"/><path d="M9.5 14.2 11.3 16l3.6-4"/></svg>
            </span>
            <span class="dock-label">兑奖</span>
          </button>
          <button class="dock-item" type="button" data-view="mine" aria-label="我的">
            <span class="dock-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="8.5" r="3.5"/><path d="M4.5 19.5c.8-3.6 3.7-6 7.5-6s6.7 2.4 7.5 6"/></svg>
            </span>
            <span class="dock-label">我的</span>
          </button>
        </div>
      </nav>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
