name: Update lottery draws

on:
  workflow_dispatch:
  schedule:
    - cron: "50 13 * * *"
    - cron: "30 14 * * *"
    - cron: "0 15 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-draws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest draws
        env:
          JISU_APPKEY: ${{ secrets.JISU_APPKEY }}
        run: node scripts/update-draws.js

      - name: Commit updated draw data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update lottery draws"
          file_pattern: web/data/lottery_draws.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
